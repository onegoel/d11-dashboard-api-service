steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        EXTRA_ARGS=()
        if [[ -n "${_CLOUD_SQL_INSTANCE}" ]]; then
          EXTRA_ARGS+=(--set-cloudsql-instances "${_CLOUD_SQL_INSTANCE}")
        fi

        gcloud run jobs deploy "${_MIGRATION_JOB_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}" \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --command npx \
          --args prisma,migrate,deploy \
          --set-env-vars "NODE_ENV=production" \
          --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
          "${EXTRA_ARGS[@]}"

        gcloud run jobs execute "${_MIGRATION_JOB_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --wait

        EXTRA_ARGS=()
        if [[ -n "${_CLOUD_SQL_INSTANCE}" ]]; then
          EXTRA_ARGS+=(--set-cloudsql-instances "${_CLOUD_SQL_INSTANCE}")
        fi

        gcloud run jobs deploy "${_SYNC_IDS_JOB_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}" \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --command npx \
          --args tsx,scripts/sync-cricapi-ids.ts,--apply,--seasonId=${_CRICAPI_DB_SEASON_ID},--seriesId=${_CRICAPI_SERIES_ID} \
          --set-env-vars "NODE_ENV=production,CRICAPI_DB_SEASON_ID=${_CRICAPI_DB_SEASON_ID},CRICAPI_SERIES_ID=${_CRICAPI_SERIES_ID},CRICAPI_IPL_2026_DB_SEASON_ID=${_CRICAPI_IPL_2026_DB_SEASON_ID},CRICAPI_IPL_2026_SERIES_ID=${_CRICAPI_IPL_2026_SERIES_ID}" \
          --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
          --set-secrets "CRICAPI_API_KEY=CRICAPI_API_KEY:latest" \
          "${EXTRA_ARGS[@]}"

        gcloud run jobs execute "${_SYNC_IDS_JOB_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --wait

        EXTRA_ARGS=()
        if [[ -n "${_CLOUD_SQL_INSTANCE}" ]]; then
          EXTRA_ARGS+=(--add-cloudsql-instances "${_CLOUD_SQL_INSTANCE}")
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --project "${PROJECT_ID}" \
          --region "${_REGION}" \
          --platform managed \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}" \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --allow-unauthenticated \
          --set-env-vars "NODE_ENV=production,CORS_ORIGIN=${_CORS_ORIGIN},BEST_N_DROP_COUNT=${_BEST_N_DROP_COUNT},CRICAPI_SCORE_SOURCE=${_CRICAPI_SCORE_SOURCE},CRICAPI_ENABLE_SCORE_POLLER=${_CRICAPI_ENABLE_SCORE_POLLER},CRICAPI_ENABLE_MOCK_SCORE_FALLBACK=${_CRICAPI_ENABLE_MOCK_SCORE_FALLBACK}" \
          --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
          --set-secrets "FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest" \
          --set-secrets "FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest" \
          --set-secrets "FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest" \
          --set-secrets "CRICAPI_API_KEY=CRICAPI_API_KEY:latest" \
          "${EXTRA_ARGS[@]}"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: d11-dashboard-api-service
  _MIGRATION_JOB_NAME: d11-dashboard-api-service-migrate
  _SYNC_IDS_JOB_NAME: d11-dashboard-api-service-sync-cricapi-ids
  _AR_REPO: d11-dashboard-api-container-repo
  _RUNTIME_SERVICE_ACCOUNT: ""
  _CLOUD_SQL_INSTANCE: ""
  _CORS_ORIGIN: ""
  _BEST_N_DROP_COUNT: "5"
  _CRICAPI_DB_SEASON_ID: "1"
  _CRICAPI_SERIES_ID: "87c62aac-bc3c-4738-ab93-19da0690488f"
  _CRICAPI_IPL_2026_DB_SEASON_ID: "1"
  _CRICAPI_IPL_2026_SERIES_ID: "87c62aac-bc3c-4738-ab93-19da0690488f"
  _CRICAPI_SCORE_SOURCE: "live"
  _CRICAPI_ENABLE_SCORE_POLLER: "true"
  _CRICAPI_ENABLE_MOCK_SCORE_FALLBACK: "false"

options:
  logging: CLOUD_LOGGING_ONLY
