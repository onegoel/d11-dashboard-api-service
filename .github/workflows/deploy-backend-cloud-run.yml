name: Deploy Backend To Cloud Run

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - dev
          - prod

concurrency:
  group: deploy-backend-cloud-run-${{ github.ref_name }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
  AR_REPO: ${{ vars.BACKEND_AR_REPO }}
  MIGRATION_JOB_NAME: ${{ vars.BACKEND_MIGRATION_JOB_NAME || format('{0}-migrate', vars.BACKEND_SERVICE_NAME) }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'auto' && github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate target environment
        run: |
          TARGET_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'auto' && github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || 'dev') }}"
          if [[ "$TARGET_ENV" == "prod" && "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Prod deployments are only allowed from main"
            exit 1
          fi
          echo "Deploying to environment: $TARGET_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Run database migrations
        run: |
          EXTRA_ARGS=()
          if [[ -n "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}" ]]; then
            EXTRA_ARGS+=(--set-cloudsql-instances "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}")
          fi

          gcloud run jobs deploy "$MIGRATION_JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE_URI" \
            --service-account "${{ vars.BACKEND_RUNTIME_SA }}" \
            --command npx \
            --args prisma,migrate,deploy \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            "${EXTRA_ARGS[@]}"

          gcloud run jobs execute "$MIGRATION_JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --wait

      - name: Seed reference data
        run: |
          SEED_JOB_NAME="${MIGRATION_JOB_NAME%-migrate}-seed"
          EXTRA_ARGS=()
          if [[ -n "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}" ]]; then
            EXTRA_ARGS+=(--set-cloudsql-instances "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}")
          fi

          gcloud run jobs deploy "$SEED_JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE_URI" \
            --service-account "${{ vars.BACKEND_RUNTIME_SA }}" \
            --command npx \
            --args tsx,prisma/seed.ts \
            --set-env-vars "NODE_ENV=production,SEED_ENV=production" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            "${EXTRA_ARGS[@]}"

          gcloud run jobs execute "$SEED_JOB_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --wait

      - name: Deploy to Cloud Run
        run: |
          EXTRA_ARGS=()
          if [[ -n "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}" ]]; then
            EXTRA_ARGS+=(--add-cloudsql-instances "${{ vars.BACKEND_CLOUD_SQL_INSTANCE }}")
          fi

          gcloud run deploy "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --platform managed \
            --image "$IMAGE_URI" \
            --allow-unauthenticated \
            --service-account "${{ vars.BACKEND_RUNTIME_SA }}" \
            --set-env-vars "NODE_ENV=production,CORS_ORIGIN=${{ vars.BACKEND_CORS_ORIGIN }},BEST_N_DROP_COUNT=${{ vars.BACKEND_BEST_N_DROP_COUNT }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --set-secrets "FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest" \
            --set-secrets "FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest" \
            --set-secrets "FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest" \
            "${EXTRA_ARGS[@]}"
